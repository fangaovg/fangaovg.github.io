<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发票信息</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
        }
        body {
            background-color: #ffffff;
            padding: 60px 20px;
        }
        .invoice-wrapper {
            max-width: 900px;
            margin: 0 auto;
            text-align: center;
        }
        .main-title {
            font-size: 48px;
            font-weight: 500;
            color: #000000;
            margin-bottom: 36px;
            letter-spacing: 2px;
        }
        .desc-text {
            font-size: 32px;
            color: #333333;
            line-height: 1.6;
            margin-bottom: 90px;
            padding: 0 20px;
        }
        .info-row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            margin-bottom: 36px;
            padding: 0 60px;
        }
        .info-label {
            font-size: 28px;
            color: #999999;
            width: 180px;
            text-align: left;
            font-weight: 400;
        }
        .info-value {
            font-size: 32px;
            color: #000000;
            text-align: left;
            flex: 1;
            font-weight: 400;
        }
        @media (max-width: 768px) {
            body {
                padding: 30px 15px;
            }
            .main-title {
                font-size: 36px;
            }
            .desc-text {
                font-size: 24px;
                margin-bottom: 60px;
            }
            .info-label {
                font-size: 22px;
                width: 140px;
            }
            .info-value {
                font-size: 24px;
            }
            .info-row {
                padding: 0 20px;
                margin-bottom: 28px;
            }
        }
    </style>
</head>
<body>
    <div class="invoice-wrapper">
        <h1 class="main-title">发票信息</h1>
        <p class="desc-text">以下信息仅为发票二维码所含信息，并不代<br>表查验发票真伪的结果。</p>
        
        <div class="info-row">
            <span class="info-label">发票号码</span>
            <span class="info-value">26442000000024661462</span>
        </div>
        <div class="info-row">
            <span class="info-label">合计金额</span>
            <span class="info-value">¥129.28(含税)</span>
        </div>
        <div class="info-row">
            <span class="info-label">开票日期</span>
            <span class="info-value">2026.04.10</span>
        </div>
    </div>
</body>
</html>
