<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信息收集表</title>
<style>
*{box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
body{background:#f7f8fa;padding:20px;max-width:500px;margin:40px auto}
.box{background:#fff;padding:30px;border-radius:16px;box-shadow:0 4px 20px rgba(0,0,0,0.06)}
h2{text-align:center;margin-bottom:24px;color:#222}
.item{margin-bottom:20px}
label{display:block;margin-bottom:8px;font-weight:500;color:#333}
input{width:100%;padding:14px;border:1px solid #ddd;border-radius:10px;font-size:15px}
.upload{border:2px dashed #cce;border-radius:10px;padding:24px;text-align:center;cursor:pointer}
.upload input{display:none}
button{width:100%;padding:15px;background:#2d6aff;color:white;border:none;border-radius:10px;font-size:16px;font-weight:500;margin-top:10px}
#tip{margin-top:20px;padding:12px;border-radius:8px;text-align:center}
.error{background:#fee;color:#c72c2c}
</style>
</head>
<body>
<div class="box">
  <h2>个人信息收集</h2>

  <div class="item">
    <label>姓名</label>
    <input type="text" id="name" placeholder="请输入真实姓名">
  </div>

  <div class="item">
    <label>身份证号</label>
    <input type="text" id="idcard" placeholder="请输入18位身份证号码">
  </div>

  <div class="item">
    <label>所在城市</label>
    <input type="text" id="city" placeholder="例如：广东省深圳市">
  </div>

  <div class="item">
    <label>一寸证件照</label>
    <div class="upload" onclick="document.getElementById('img').click()">
      点击上传一寸照片（JPG/PNG）
      <input type="file" id="img" accept="image/jpeg,image/png">
    </div>
  </div>

  <button onclick="send()">提交信息</button>
  <div id="tip"></div>
</div>

<script>
// ==============================================
// 这里改成你的邮箱
const YOUR_EMAIL = "1256907427@qq.com";
// ==============================================

async function send() {
  const t = document.getElementById("tip");
  const name = document.getElementById("name").value.trim();
  const idcard = document.getElementById("idcard").value.trim();
  const city = document.getElementById("city").value.trim();
  const photo = document.getElementById("img").files[0];

  if (!name || !idcard || !city || !photo) {
    t.textContent = "请填写完整信息并上传照片";
    t.className = "error";
    return;
  }

  t.textContent = "提交中，请稍候…";

  const fd = new FormData();
  fd.append("姓名", name);
  fd.append("身份证号", idcard);
  fd.append("城市", city);
  fd.append("证件照", photo);  // 照片字段
  fd.append("_subject", "客户信息提交（带照片）");

  try {
    const res = await fetch("https://formsubmit.co/" + YOUR_EMAIL, {
      method: "POST",
      body: fd
    });

    if (res.ok) {
      // 成功后跳转
      window.location.href = "success.html";
    } else {
      t.textContent = "提交失败，请重试";
      t.className = "error";
    }
  } catch (e) {
    t.textContent = "网络异常，请重试";
    t.className = "error";
  }
}
</script>
</body>
</html>
